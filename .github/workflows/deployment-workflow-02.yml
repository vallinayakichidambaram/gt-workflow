# This workflow has multiple jobs - by default jobs run in parallel - takes less time to complete than deployment-workflow
name: deployment exercise 2
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
       - name: Get Code
         uses: actions/checkout@v3
       - name: Install dependencies
         run: npm ci
       - name: Lint
         run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
       - name: Get Code
         uses: actions/checkout@v3
       - name: Install dependencies
         run: npm ci
       - name: Test Code
         run: npm run test
  build:
    runs-on: ubuntu-latest
    steps:
       - name: Get Code
         uses: actions/checkout@v3
       - name: Install dependencies
         run: npm ci
       - name: Build
         run: npm run build
  deploy:
    runs-on: ubuntu-latest
    steps:
       - name: Get Code
         uses: actions/checkout@v3
       - name: Install dependencies
         run: npm ci
       - name: Deploy Code
         run: echo "Deploying exercise 2...."
